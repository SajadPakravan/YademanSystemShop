name: yad_sys
description: "فروشگاه یادمان سیستم"
publish_to: 'none'
version: 2.5.8

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  cached_network_image: ^3.3.1
  carousel_slider: ^5.0.0
  check_vpn_connection: ^0.0.2
  connectivity_plus: ^6.1.1
  get: ^4.6.6
  http: ^1.2.1
  image_picker: ^1.2.2
  internet_connection_checker: ^3.0.1
  loading_animation_widget: ^1.2.0+4
  path_provider: ^2.0.15
  persian_number_utility: ^1.1.3
  shared_preferences: ^2.1.1
  show_up_animation: ^2.0.0
  email_validator: ^3.0.0
  easy_loading_button: ^0.4.0
  image_cropper: ^12.2.1
  flutter_widget_from_html: ^0.17.2
  flutter_staggered_animations: ^1.1.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  webview_flutter: ^4.8.0
  flutter_rating_bar: ^4.0.1
  simple_shadow: ^0.3.1
  smooth_page_indicator: ^2.0.1
  flutter_svg: ^2.0.10+1
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/logos/

  fonts:
    - family: IranYekan
      fonts:
        - asset: assets/fonts/iranyekan.ttf